name: agent
runtime:
  name: go
  options:
    buildTarget: ./bin/pulumi
description: Formance Agent deployment (build image, deploy via Helm)
x-plr-config:
  k8s-context:
    type: string
    required: true
    description: Kubernetes context to use
  namespace:
    type: string
    required: true
    description: Kubernetes namespace to deploy into (must already exist)
  registry:
    type: string
    default: ghcr.io
    description: Docker registry for building images
  pull-registry:
    type: string
    description: Docker registry for pulling images (defaults to registry)
  docker-builder-name:
    type: string
    description: Docker buildx builder name
  imageTag:
    type: string
    description: Image tag (defaults to git version)
  arch:
    type: string
    default: amd64
    description: Target CPU architecture
  registry-username:
    type: string
    secret: true
    description: Docker registry username
  registry-password:
    type: string
    secret: true
    description: Docker registry password
  image-pull-secrets:
    type: array
    description: "Image pull secrets [{name: string}]"
  server-address:
    type: string
    default: "app.formance.cloud:443"
    description: Membership server address
  tls-enabled:
    type: boolean
    default: true
    description: Enable TLS for server connection
  tls-insecure-skip-verify:
    type: boolean
    default: true
    description: Skip TLS certificate verification
  agent-id:
    type: string
    required: true
    description: Agent ID for membership registration
  base-url:
    type: string
    required: true
    description: Base URL for the region
  additional-base-urls:
    type: array
    description: Additional base URLs for the region
  production:
    type: boolean
    default: false
    description: Mark as production agent
  outdated:
    type: boolean
    default: false
    description: Mark region as outdated
  authentication-mode:
    type: string
    default: bearer
    description: "Authentication mode: token or bearer"
  authentication-issuer:
    type: string
    default: "https://app.formance.cloud/api"
    description: OAuth2 issuer URL (bearer mode)
  authentication-client-secret:
    type: string
    secret: true
    description: Client secret (bearer mode) or token (token mode)
  debug:
    type: boolean
    default: false
    description: Enable debug mode on the agent
  node-selector:
    type: object
    description: "Node selector for the agent pod"
  tolerations:
    type: array
    description: "Tolerations for the agent pod"

syntax = "proto3";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/formancehq/membership/internal/grpc/generated";

package server;

// Pull-based agent service. The agent polls for stacks and reports status via unary RPCs.
service AgentService {
  // Agent pulls stacks that need syncing, paginated by (updated_at, id) cursor
  rpc ListStacks(ListStacksRequest) returns (ListStacksResponse);

  // Agent reports observed state back to membership
  rpc ReportStackStatus(ReportStackStatusRequest) returns (ReportStackStatusResponse);
  rpc ReportStackDeleted(ReportStackDeletedRequest) returns (ReportStackDeletedResponse);
  rpc ReportModuleStatus(ReportModuleStatusRequest) returns (ReportModuleStatusResponse);
  rpc ReportModuleDeleted(ReportModuleDeletedRequest) returns (ReportModuleDeletedResponse);

  // Version management
  rpc UpsertVersion(UpsertVersionRequest) returns (UpsertVersionResponse);
  rpc DeleteVersion(DeleteVersionRequest) returns (DeleteVersionResponse);

  // Agent heartbeat (replaces ping/pong)
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Graceful disconnect — marks the region as inactive
  rpc Disconnect(DisconnectRequest) returns (DisconnectResponse);
}

// ─── ListStacks ───

message ListStacksRequest {
  string region_id = 1;
  int32 page_size = 2;
  string cursor = 3; // opaque, base64-encoded (updated_at, id). Empty = start from beginning.
}

message ListStacksResponse {
  repeated Stack stacks = 1;
  string next_cursor = 2; // empty if last page
  bool has_more = 3;
}

// ─── Report messages ───

message ReportStackStatusRequest {
  StatusChanged status_changed = 1;
}
message ReportStackStatusResponse {}

message ReportStackDeletedRequest {
  DeletedStack stack_deleted = 1;
}
message ReportStackDeletedResponse {}

message ReportModuleStatusRequest {
  ModuleStatusChanged module_status_changed = 1;
}
message ReportModuleStatusResponse {}

message ReportModuleDeletedRequest {
  ModuleDeleted module_deleted = 1;
}
message ReportModuleDeletedResponse {}

// ─── Version management ───

message UpsertVersionRequest {
  string name = 1;
  map<string, string> versions = 2;
  bool deprecated = 3;
}
message UpsertVersionResponse {}

message DeleteVersionRequest {
  string name = 1;
}
message DeleteVersionResponse {}

// ─── Heartbeat ───

message HeartbeatRequest {
  string region_id = 1;
  string base_url = 2;
  repeated string additional_base_urls = 3;
  string version = 4;
  bool production = 5;
  repeated string capabilities = 6;
  repeated string modules = 7;
}
message HeartbeatResponse {}

message DisconnectRequest {}
message DisconnectResponse {}

// ─── Shared data types ───

message Stack {
  string clusterName = 1;
  string seed = 2;
  AuthConfig authConfig = 3;
  repeated AuthClient staticClients = 4;
  StargateConfig stargateConfig = 5;
  bool disabled = 6;
  reserved 7;
  string versions = 8;
  reserved 9;
  map<string, string> additionalLabels = 10;
  map<string, string> additionalAnnotations = 11;
  repeated Module modules = 12;
  string expectedStatus = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message Module {
  string name = 1;
}

enum StackStatus {
  Progressing = 0;
  Ready = 1;
  Deleted = 2;
  Disabled = 3;
}

message VersionKind {
  string version = 1;
  string kind = 2;
}

message ModuleStatusChanged {
  string clusterName = 1;
  google.protobuf.Struct status = 2;
  VersionKind vk = 3;
}

message ModuleDeleted {
  string clusterName = 1;
  VersionKind vk = 2;
}

message StatusChanged {
  string clusterName = 1;
  StackStatus status = 2;
  google.protobuf.Struct statuses = 3;
  VersionKind vk = 4;
}

message StargateConfig {
  bool enabled = 1;
  string url = 2;
  bool disableTLS = 3;
}

message DeletedStack {
  string clusterName = 1;
}

message AuthConfig {
  string clientId = 1;
  string clientSecret = 2;
  string issuer = 3;
}

message AuthClient {
  bool public = 1;
  string id = 2;
}

message AddedVersion {
  string name = 1;
  map<string, string> versions = 2;
  bool deprecated = 3;
}

message UpdatedVersion {
  string name = 1;
  map<string, string> versions = 2;
  bool deprecated = 3;
}

message DeletedVersion {
  string name = 1;
}
